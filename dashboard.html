<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Allan's USMLE Class — Dashboard</title>
<link rel="stylesheet" href="css/style.css" />
<script src="js/config.js"></script>
</head>
<body>

<div id="topbar">
  <div class="brand">
    <div class="logo">U</div>
    <h1>Allan's <span>USMLE</span> Class</h1>
  </div>
  <div id="nav-actions">
    <a id="nav-zoom" class="nav-action zoom" target="_blank" rel="noopener" title="Join the live class on Zoom">
      <span class="nav-icon">🎥</span><span class="nav-label">Join class</span>
    </a>
    <a id="nav-whatsapp" class="nav-action whatsapp" target="_blank" rel="noopener" title="Class WhatsApp group">
      <span class="nav-icon">💬</span><span class="nav-label">Class WhatsApp</span>
    </a>
    <a id="nav-subscribe" class="nav-action subscribe" target="_blank" rel="noopener" title="Subscribe to the class schedule in your calendar app">
      <span class="nav-icon">📅</span><span class="nav-label">Subscribe</span>
    </a>
  </div>
  <div id="user-chip">
    <img id="user-pic" alt="" />
    <span id="user-name"></span>
    <button id="signout-btn">Sign out</button>
  </div>
</div>

<main id="layout">

  <div id="track-switcher" style="display:none;"></div>

  <div id="tabs">
    <div class="tab active" data-panel="sessions">Sessions</div>
    <div class="tab" data-panel="materials">Materials</div>
    <div class="tab" data-panel="schedule">Schedule</div>
    <div class="tab" data-panel="announcements">Announcements</div>
  </div>

  <!-- Sessions -->
  <section class="panel active" id="panel-sessions">
    <div id="today-card"></div>
    <h2 class="section-title">Class schedule</h2>
    <div class="sessions-toolbar">
      <input type="search" id="sessions-search" placeholder="Search topics, notes, or FA pages…" />
    </div>
    <div id="chapter-tabs" class="chapter-tabs"></div>
    <div id="sessions-list"></div>
  </section>

  <!-- Materials -->
  <section class="panel" id="panel-materials">
    <h2 class="section-title">High-yield materials</h2>
    <div id="materials-list" class="materials-grid"></div>
  </section>

  <!-- Schedule -->
  <section class="panel" id="panel-schedule">
    <h2 class="section-title">Calendar</h2>
    <div id="schedule-wrap" class="calendar-wrap">
      <div class="cal-toolbar">
        <button id="cal-prev" class="cal-nav" title="Previous month">‹</button>
        <h3 id="cal-month">—</h3>
        <button id="cal-next" class="cal-nav" title="Next month">›</button>
        <button id="cal-today" class="cal-today">Today</button>
      </div>
      <div class="cal-weekdays">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
      </div>
      <div id="cal-grid" class="cal-grid"></div>
      <div id="cal-legend" class="cal-legend"></div>
    </div>
  </section>

  <!-- Announcements -->
  <section class="panel" id="panel-announcements">
    <h2 class="section-title">Announcements</h2>
    <div id="announcements-list"></div>
  </section>

</main>

<footer>© Allan Bakesiga · USMLE prep</footer>

<script src="js/auth.js"></script>
<script src="js/ics.js"></script>
<script src="js/app.js"></script>
</body>
</html>
