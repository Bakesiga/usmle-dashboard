<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · USMLE Classes</title>
  <meta name="theme-color" content="#F6F1E7" />

  <!-- Add to Home Screen / installable web app -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="USMLE" />
  <meta name="application-name" content="USMLE" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="css/design-tokens.css" />
  <link rel="stylesheet" href="css/site.css" />
  <link rel="stylesheet" href="css/theme-vitals.css" />
  <link rel="stylesheet" href="css/dashboard-vitals.css" />
  <style>
    /* Sign-in card: clean paper on cream, cyan accent border, aurora backdrop */
    body.signin-page { background: var(--bg); min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: var(--font-body); position: relative; overflow: hidden; }
    body.signin-page::before {
      content: "";
      position: fixed;
      inset: -10px;
      background-image:
        repeating-linear-gradient(100deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.92) 7%, transparent 10%, transparent 12%, rgba(255,255,255,0.92) 16%),
        repeating-linear-gradient(100deg, rgba(2,132,199,0.45) 10%, rgba(99,102,241,0.35) 15%, rgba(56,189,248,0.45) 20%, rgba(167,139,250,0.35) 25%, rgba(2,132,199,0.45) 30%);
      background-size: 300% 200%, 200% 100%;
      background-position: 50% 50%, 50% 50%;
      filter: blur(14px);
      mix-blend-mode: multiply;
      animation: aurora-drift-signin 60s linear infinite;
      pointer-events: none;
      opacity: 0.5;
      mask-image: radial-gradient(ellipse at 50% 50%, black 0%, black 35%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 0%, black 35%, transparent 75%);
      z-index: 0;
    }
    @keyframes aurora-drift-signin {
      from { background-position: 50% 50%, 50% 50%; }
      to { background-position: 350% 50%, 350% 50%; }
    }
    @media (prefers-reduced-motion: reduce) {
      body.signin-page::before { animation: none; }
    }
    .signin-card { background: var(--bg-cream); border: 1px solid var(--border); border-top: 3px solid #0284C7; border-radius: 18px; padding: 40px 32px; max-width: 460px; width: 100%; box-shadow: 0 20px 60px rgba(17, 37, 47, 0.12); position: relative; z-index: 1; }
    .signin-card h1 { font-family: var(--font-display); font-weight: 400; font-size: clamp(1.6rem, 3vw + 0.5rem, 2.2rem); line-height: 1.1; margin: 24px 0 12px; color: var(--ink); }
    .signin-card p { color: var(--ink-2); font-size: 15px; line-height: 1.55; margin: 0 0 8px; }
    .signin-help { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; color: var(--muted); margin-top: 24px !important; }
    .signin-help a { color: #0284C7; }
  </style>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="signin-page" data-screen-label="02 Sign-in">
  <main class="signin-card">
    <a class="brand" href="index.html" aria-label="USMLE Classes home">
      <span class="brand-mark" aria-hidden="true">U</span>
      <span>USMLE Classes <small>· with Allan</small></span>
    </a>
    <h1>Sign in to access your dashboard.</h1>
    <p>The dashboard holds your daily Zoom link, slides, notes, and the cohort calendar. It's only open to enrolled students.</p>

    <!-- Real Google sign-in button renders here -->
    <div id="g-signin-container" style="display:flex; justify-content:center; margin: 1.5rem 0;"></div>

    <!-- Status / error feedback -->
    <p id="signin-status" role="status" aria-live="polite" style="min-height:1.5em; margin:0.5rem 0 0; font-size:0.95rem; color:#B45309;"></p>

    <p class="signin-help">
      Trouble signing in? <a href="mailto:allanbakesiga@gmail.com">Email Allan</a>.
    </p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    /* Bridge: when Google Identity Services finishes loading, initialize the
     * sign-in button and wire its callback to USMLE_AUTH.handleCredential. */
    (function () {
      var statusEl = document.getElementById("signin-status");
      var container = document.getElementById("g-signin-container");

      function showError(msg) {
        statusEl.textContent = msg;
        statusEl.style.color = "#B45309";
      }
      function showOK(msg) {
        statusEl.textContent = msg;
        statusEl.style.color = "#065F46";
      }

      /* Honor ?return=<url> if the URL is same-origin. Used by the artifact
       * gate so that a student bounced from outputs/study-notes/foo.html
       * lands back on foo.html after they sign in. */
      function safeReturnTarget() {
        try {
          var params = new URLSearchParams(window.location.search);
          var raw = params.get("return");
          if (!raw) return null;
          var target = new URL(raw, window.location.origin);
          if (target.origin !== window.location.origin) return null;
          return target.href;
        } catch (e) {
          return null;
        }
      }

      function landingTarget() {
        return safeReturnTarget() || "dashboard.html";
      }

      function onCredential(response) {
        if (!response || !response.credential) {
          showError("Sign-in cancelled. Try again.");
          return;
        }
        // Ensure the allowlist is fetched before we check the credential.
        USMLE_AUTH.loadAllowlist().then(function () {
          var result = USMLE_AUTH.handleCredential(response.credential);
          if (!result.ok) {
            showError(result.error);
            return;
          }
          showOK("Signed in. Loading your dashboard…");
          var dest = landingTarget();
          setTimeout(function () { location.replace(dest); }, 400);
        });
      }

      function init() {
        if (!window.google || !google.accounts || !google.accounts.id) {
          setTimeout(init, 100);
          return;
        }
        google.accounts.id.initialize({
          client_id: USMLE_CONFIG.GOOGLE_CLIENT_ID,
          callback: onCredential,
          auto_select: false,
          cancel_on_tap_outside: true,
        });
        google.accounts.id.renderButton(container, {
          type: "standard",
          theme: "filled_blue",
          size: "large",
          text: "continue_with",
          shape: "pill",
          logo_alignment: "left",
          width: 280,
        });
      }

      // If already signed in, skip straight to the dashboard (or the
      // requested return target).
      var existing = USMLE_AUTH.getSession();
      if (existing) {
        location.replace(landingTarget());
      } else {
        init();
      }
    })();
  </script>

  <script src="js/tweaks.js"></script>
</body>
</html>
