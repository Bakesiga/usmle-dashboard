<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · USMLE Classes</title>
  <meta name="theme-color" content="#0C2A3D" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="css/design-tokens.css" />
  <link rel="stylesheet" href="css/site.css" />

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="signin-page" data-screen-label="02 Sign-in">
  <main class="signin-card">
    <a class="brand" href="index.html" aria-label="USMLE Classes home">
      <span class="brand-mark" aria-hidden="true">U</span>
      <span>USMLE Classes <small>· with Allan</small></span>
    </a>
    <h1>Sign in to access your dashboard.</h1>
    <p>The dashboard holds your daily Zoom link, slides, notes, and the cohort calendar. It's only open to enrolled students.</p>

    <!-- Real Google sign-in button renders here -->
    <div id="g-signin-container" style="display:flex; justify-content:center; margin: 1.5rem 0;"></div>

    <!-- Status / error feedback -->
    <p id="signin-status" role="status" aria-live="polite" style="min-height:1.5em; margin:0.5rem 0 0; font-size:0.95rem; color:#B45309;"></p>

    <p class="signin-help">
      Trouble signing in? <a href="mailto:allanbakesiga@gmail.com">Email Allan</a>.
    </p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    /* Bridge: when Google Identity Services finishes loading, initialize the
     * sign-in button and wire its callback to USMLE_AUTH.handleCredential. */
    (function () {
      var statusEl = document.getElementById("signin-status");
      var container = document.getElementById("g-signin-container");

      function showError(msg) {
        statusEl.textContent = msg;
        statusEl.style.color = "#B45309";
      }
      function showOK(msg) {
        statusEl.textContent = msg;
        statusEl.style.color = "#065F46";
      }

      function onCredential(response) {
        if (!response || !response.credential) {
          showError("Sign-in cancelled. Try again.");
          return;
        }
        // Ensure the allowlist is fetched before we check the credential.
        USMLE_AUTH.loadAllowlist().then(function () {
          var result = USMLE_AUTH.handleCredential(response.credential);
          if (!result.ok) {
            showError(result.error);
            return;
          }
          showOK("Signed in. Loading your dashboard…");
          setTimeout(function () { location.replace("dashboard.html"); }, 400);
        });
      }

      function init() {
        if (!window.google || !google.accounts || !google.accounts.id) {
          setTimeout(init, 100);
          return;
        }
        google.accounts.id.initialize({
          client_id: USMLE_CONFIG.GOOGLE_CLIENT_ID,
          callback: onCredential,
          auto_select: false,
          cancel_on_tap_outside: true,
        });
        google.accounts.id.renderButton(container, {
          type: "standard",
          theme: "filled_blue",
          size: "large",
          text: "continue_with",
          shape: "pill",
          logo_alignment: "left",
          width: 280,
        });
      }

      // If already signed in, skip straight to the dashboard.
      var existing = USMLE_AUTH.getSession();
      if (existing) {
        location.replace("dashboard.html");
      } else {
        init();
      }
    })();
  </script>

  <script src="js/tweaks.js"></script>
</body>
</html>
