<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Allan's USMLE Class</title>
<link rel="stylesheet" href="css/style.css" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/config.js"></script>
</head>
<body>

<div id="topbar">
  <div class="brand">
    <div class="logo">U</div>
    <h1>Allan's <span>USMLE</span> Class</h1>
  </div>
</div>

<main id="signin">
  <div class="signin-card">
    <div class="logo-big">U</div>
    <h2>Welcome</h2>
    <p>Sign in with the Gmail address Allan used to enrol you. Recordings, materials, and the schedule live inside.</p>

    <div class="gbtn">
      <div id="g_id_onload"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="onGoogleSignIn"
           data-auto_prompt="false"></div>
      <div class="g_id_signin"
           data-type="standard"
           data-shape="pill"
           data-theme="filled_black"
           data-text="signin_with"
           data-size="large"
           data-logo_alignment="left"></div>
    </div>

    <div id="auth-error"></div>

    <p class="note">Access is limited to enrolled students. If your Gmail isn't recognised, message Allan.</p>
  </div>
</main>

<footer>© Allan Bakesiga · USMLE prep</footer>

<script src="js/auth.js"></script>
<script>
  // If already signed in, send straight to dashboard
  if (USMLE_AUTH.getSession()) location.replace('dashboard.html');

  // Wire the Google client ID into the GSI div once config.js has loaded
  document.getElementById('g_id_onload').setAttribute('data-client_id', USMLE_CONFIG.GOOGLE_CLIENT_ID);

  function onGoogleSignIn(response) {
    const result = USMLE_AUTH.handleCredential(response.credential);
    const errBox = document.getElementById('auth-error');
    if (result.ok) {
      location.replace('dashboard.html');
    } else {
      errBox.textContent = result.error;
      errBox.style.display = 'block';
    }
  }
</script>
</body>
</html>
